<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <title>
        {% if page.title %}
            {{ page.title }}
        {% else %} 
            {{ site.name }} &mdash; {{ site.description }}
        {% endif %}
    </title>

    {% if site.highlighter %}
        <link rel='stylesheet' href='{{ site.url }}/assets/css/syntax.css' type='text/css'>
    {% endif %}
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <script>
        (function () {
            var language = 'en';
            try {
                language = localStorage.getItem('siteLanguage') || 'en';
            } catch (error) {}
            if (language !== 'zh') {
                language = 'en';
            }
            document.documentElement.classList.add('lang-' + language);
            document.documentElement.lang = language === 'zh' ? 'zh-Hans' : 'en';
        }());
    </script>
    <style>
        @font-face {
            font-family: "Hanqing Latin";
            src: local("Times New Roman");
            unicode-range: U+0000-024F, U+1E00-1EFF, U+2000-206F;
        }

        @font-face {
            font-family: "Hanqing CJK";
            src: local("Noto Serif SC"), local("Source Han Serif SC"), local("Songti SC"), local("SimSun");
            unicode-range: U+2E80-2EFF, U+3000-303F, U+3400-4DBF, U+4E00-9FFF, U+F900-FAFF, U+FF00-FFEF;
        }

        body,
        button,
        input,
        textarea,
        select {
            font-family: "Hanqing Latin", "Hanqing CJK", "Times New Roman", "Noto Serif SC", "Source Han Serif SC", "Songti SC", "SimSun", serif;
        }

        [data-lang="zh"] {
            display: none;
        }

        html.lang-zh [data-lang="en"] {
            display: none;
        }

        html.lang-zh [data-lang="zh"] {
            display: revert;
        }

        html.lang-en [data-lang="zh"] {
            display: none;
        }

        nav {
            align-items: baseline;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            max-width: 820px;
        }

        nav > span[data-lang] {
            flex: 0 1 auto;
        }

        .language-choice {
            margin-left: auto;
            white-space: nowrap;
        }

        .language-choice button {
            background: none;
            border: 0;
            color: #00e;
            cursor: pointer;
            font: inherit;
            padding: 0;
            text-decoration: underline;
        }

        .language-choice button[aria-pressed="true"] {
            color: inherit;
            cursor: default;
            text-decoration: none;
        }
    </style>

</head>

<body>
    {% include header.html %}

    {{ content }}

    <script>
        (function () {
            function setLanguage(language) {
                if (language !== 'zh') {
                    language = 'en';
                }

                document.documentElement.classList.remove('lang-en', 'lang-zh');
                document.documentElement.classList.add('lang-' + language);
                document.documentElement.lang = language === 'zh' ? 'zh-Hans' : 'en';

                try {
                    localStorage.setItem('siteLanguage', language);
                } catch (error) {}

                var choices = document.querySelectorAll('[data-language-choice]');
                for (var index = 0; index < choices.length; index += 1) {
                    var choice = choices[index];
                    choice.setAttribute('aria-pressed', choice.getAttribute('data-language-choice') === language ? 'true' : 'false');
                }
            }

            var activeLanguage = document.documentElement.classList.contains('lang-zh') ? 'zh' : 'en';
            var choices = document.querySelectorAll('[data-language-choice]');
            for (var index = 0; index < choices.length; index += 1) {
                choices[index].addEventListener('click', function () {
                    setLanguage(this.getAttribute('data-language-choice'));
                });
            }
            setLanguage(activeLanguage);
        }());
    </script>
</body>
</html>
