<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-label="A compact operator maps a diffuse ball to a thinner ellipsoid with spectral values accumulating toward zero.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfaf4"/>
      <stop offset="1" stop-color="#eef3f0"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#d8c27b" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#d8c27b" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c9ca0"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
  </defs>

  <rect width="960" height="540" rx="10" fill="url(#bg)"/>
  <circle cx="265" cy="272" r="148" fill="url(#halo)"/>
  <circle cx="672" cy="272" r="124" fill="url(#halo)" opacity="0.7"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g transform="translate(260 270) rotate(-12)" opacity="0.72">
      <ellipse cx="0" cy="0" rx="132" ry="92" stroke="#607873" stroke-width="1.7"/>
      <ellipse cx="0" cy="0" rx="132" ry="36" stroke="#607873" stroke-width="1.05" opacity="0.48"/>
      <ellipse cx="0" cy="0" rx="36" ry="92" stroke="#607873" stroke-width="1.05" opacity="0.48"/>
      <path d="M-110 -45 C-56 -92 45 -100 112 -36" stroke="#607873" stroke-width="0.95" opacity="0.30"/>
      <path d="M-118 34 C-50 82 52 83 117 28" stroke="#607873" stroke-width="0.95" opacity="0.25"/>
      <g stroke="#b79c61" stroke-width="1" opacity="0.25">
        <path d="M-92 -72 C-40 -21 41 -12 96 -66"/>
        <path d="M-101 68 C-47 17 43 12 101 61"/>
      </g>
    </g>

    <path d="M408 272 C452 236, 491 236, 535 272" stroke="#7c9ca0" stroke-width="2" opacity="0.68" marker-end="url(#arrow)"/>

    <g transform="translate(666 270) rotate(-12)" opacity="0.78">
      <ellipse cx="0" cy="0" rx="151" ry="54" stroke="#516e71" stroke-width="2.2"/>
      <ellipse cx="0" cy="0" rx="151" ry="19" stroke="#516e71" stroke-width="1.05" opacity="0.42"/>
      <ellipse cx="0" cy="0" rx="47" ry="54" stroke="#516e71" stroke-width="0.95" opacity="0.32"/>
      <path d="M-136 0 H136" stroke="#b79c61" stroke-width="1.1" opacity="0.50"/>
      <path d="M0 -45 V45" stroke="#b79c61" stroke-width="1" opacity="0.32"/>
    </g>

    <path d="M596 390 C651 373, 694 361, 744 356 C787 352, 823 354, 859 360" stroke="#8c9a90" stroke-width="1" opacity="0.34"/>
    <g fill="#6d8580" opacity="0.76">
      <circle cx="600" cy="389" r="5.2"/>
      <circle cx="638" cy="378" r="4.3"/>
      <circle cx="671" cy="370" r="3.5"/>
      <circle cx="700" cy="364" r="2.9"/>
      <circle cx="726" cy="360" r="2.35"/>
      <circle cx="750" cy="357" r="1.9"/>
      <circle cx="772" cy="356" r="1.55"/>
      <circle cx="793" cy="356" r="1.25"/>
      <circle cx="813" cy="357" r="1.05"/>
    </g>
    <path d="M594 389 C635 376, 686 365, 745 360" stroke="#ffffff" stroke-width="6" opacity="0.16" filter="url(#soft)"/>
  </g>
</svg>
