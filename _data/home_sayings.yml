- text:
    en: "All models are wrong, but some are useful."
    fr: "Tous les modèles sont faux, mais certains sont utiles."
    zh: "所有模型都是错的，但有些是有用的。"
  author:
    en: "George E. P. Box"
    fr: "George E. P. Box"
    zh: "乔治·博克斯"
- text:
    en: "Far better an approximate answer to the right question than an exact answer to the wrong question."
    fr: "Mieux vaut une réponse approximative à la bonne question qu'une réponse exacte à la mauvaise question."
    zh: "对正确问题给出近似答案，远胜于对错误问题给出精确答案。"
  author:
    en: "John Tukey"
    fr: "John Tukey"
    zh: "约翰·图基"
- text:
    en: "In God we trust; all others must bring data."
    fr: "Nous croyons en Dieu; tous les autres doivent apporter des données."
    zh: "我们信任上帝；其他人都必须拿出数据。"
  author:
    en: "W. Edwards Deming"
    fr: "W. Edwards Deming"
    zh: "W. 爱德华兹·戴明"
- text:
    en: "Correlation is not causation."
    fr: "La corrélation n'est pas la causalité."
    zh: "相关不等于因果。"
- text:
    en: "Absence of evidence is not evidence of absence."
    fr: "L'absence de preuve n'est pas la preuve de l'absence."
    zh: "没有证据，并不等于有证据说明其不存在。"
  author:
    en: "Carl Sagan"
    fr: "Carl Sagan"
    zh: "卡尔·萨根"
- text:
    en: "The plural of anecdote is not data."
    fr: "Le pluriel d'anecdote n'est pas données."
    zh: "轶事再多，也不是数据。"
- text:
    en: "Probability is common sense reduced to calculation."
    fr: "La probabilité est le bon sens réduit au calcul."
    zh: "概率是化为计算的常识。"
  author:
    en: "Pierre-Simon Laplace"
    fr: "Pierre-Simon Laplace"
    zh: "皮埃尔-西蒙·拉普拉斯"
- text:
    en: "Probability does not exist."
    fr: "La probabilité n'existe pas."
    zh: "概率并不存在。"
  author:
    en: "Bruno de Finetti"
    fr: "Bruno de Finetti"
    zh: "布鲁诺·德·菲内蒂"
- text:
    en: "Today's posterior is tomorrow's prior."
    fr: "La loi a posteriori d'aujourd'hui est la loi a priori de demain."
    zh: "今日的后验，是明日的先验。"
- text:
    en: "The map is not the territory."
    fr: "La carte n'est pas le territoire."
    zh: "地图不是疆域。"
  author:
    en: "Alfred Korzybski"
    fr: "Alfred Korzybski"
    zh: "阿尔弗雷德·柯日布斯基"
- text:
    en: "Mathematics is the queen of the sciences."
    fr: "Les mathématiques sont la reine des sciences."
    zh: "数学是科学的女王。"
  author:
    en: "Carl Friedrich Gauß"
    fr: "Carl Friedrich Gauß"
    zh: "卡尔·弗里德里希·高斯"
- text:
    en: "God made the integers; all else is the work of man."
    fr: "Dieu a fait les entiers; tout le reste est l'œuvre de l'homme."
    zh: "整数由上帝创造，其余皆为人的作品。"
  author:
    en: "Leopold Kronecker"
    fr: "Leopold Kronecker"
    zh: "利奥波德·克罗内克"
- text:
    en: "The essence of mathematics lies in its freedom."
    fr: "L'essence des mathématiques réside dans leur liberté."
    zh: "数学的本质在于它的自由。"
  author:
    en: "Georg Cantor"
    fr: "Georg Cantor"
    zh: "格奥尔格·康托尔"
- text:
    en: "Mathematics, rightly viewed, possesses not only truth, but supreme beauty."
    fr: "Les mathématiques, bien vues, possèdent non seulement la vérité, mais une beauté suprême."
    zh: "正确地看，数学不仅拥有真理，也拥有至高的美。"
  author:
    en: "Bertrand Russell"
    fr: "Bertrand Russell"
    zh: "伯特兰·罗素"
- text:
    en: "A mathematician is a machine for turning coffee into theorems."
    fr: "Un mathématicien est une machine qui transforme le café en théorèmes."
    zh: "数学家是一台把咖啡变成定理的机器。"
  author:
    en: "Alfréd Rényi"
    fr: "Alfréd Rényi"
    zh: "阿尔弗雷德·雷尼"
- text:
    en: "We must know; we will know."
    fr: "Nous devons savoir; nous saurons."
    zh: "我们必须知道；我们必将知道。"
  author:
    en: "David Hilbert"
    fr: "David Hilbert"
    zh: "大卫·希尔伯特"
- text:
    en: "The unreasonable effectiveness of mathematics in the natural sciences."
    fr: "La déraisonnable efficacité des mathématiques dans les sciences de la nature."
    zh: "数学在自然科学中不可思议的有效性。"
  author:
    en: "Eugene Wigner"
    fr: "Eugene Wigner"
    zh: "尤金·维格纳"
- text:
    en: "I think, therefore I am."
    fr: "Je pense, donc je suis."
    zh: "我思，故我在。"
  author:
    en: "René Descartes"
    fr: "René Descartes"
    zh: "勒内·笛卡尔"
- text:
    en: "The limits of my language mean the limits of my world."
    fr: "Les limites de mon langage signifient les limites de mon monde."
    zh: "我的语言的界限，就是我的世界的界限。"
  author:
    en: "Ludwig Wittgenstein"
    fr: "Ludwig Wittgenstein"
    zh: "路德维希·维特根斯坦"
- text:
    en: "Everything should be made as simple as possible, but not simpler."
    fr: "Tout devrait être rendu aussi simple que possible, mais pas plus simple."
    zh: "凡事都应尽可能简单，但不能过于简单。"
  author:
    en: "Albert Einstein"
    fr: "Albert Einstein"
    zh: "阿尔伯特·爱因斯坦"
- text:
    en: "The purpose of models is not to fit the data, but to sharpen the questions."
    fr: "Le but des modèles n'est pas d'ajuster les données, mais d'aiguiser les questions."
    zh: "模型的目的不是拟合数据，而是磨利问题。"
  author:
    en: "Samuel Karlin"
    fr: "Samuel Karlin"
    zh: "塞缪尔·卡林"
- text:
    en: "It is easy to lie with statistics; it is easier to lie without them."
    fr: "Il est facile de mentir avec les statistiques; il est encore plus facile de mentir sans elles."
    zh: "用统计撒谎很容易；不用统计撒谎更容易。"
  author:
    en: "Frederick Mosteller"
    fr: "Frederick Mosteller"
    zh: "弗雷德里克·莫斯特勒"
- text:
    en: "The combination of some data and an aching desire for an answer does not ensure that a reasonable answer can be extracted."
    fr: "Quelques données et un désir ardent de réponse ne garantissent pas qu'on puisse en extraire une réponse raisonnable."
    zh: "一些数据加上对答案的强烈渴望，并不能保证能从中提取出合理答案。"
  author:
    en: "John Tukey"
    fr: "John Tukey"
    zh: "约翰·图基"
- text:
    en: "The best thing about being a statistician is that you get to play in everyone's backyard."
    fr: "Ce qu'il y a de mieux dans le métier de statisticien, c'est qu'on peut jouer dans le jardin de tout le monde."
    zh: "做统计学家最好的地方，是你可以到每个人的后院里玩。"
  author:
    en: "John Tukey"
    fr: "John Tukey"
    zh: "约翰·图基"
- text:
    en: "There's no sense in being precise when you don't know what you're talking about."
    fr: "Il ne sert à rien d'être précis quand on ne sait pas de quoi l'on parle."
    zh: "当你不知道自己在说什么时，精确毫无意义。"
  author:
    en: "John von Neumann"
    fr: "John von Neumann"
    zh: "约翰·冯·诺伊曼"
- text:
    en: "In mathematics you don't understand things. You just get used to them."
    fr: "En mathématiques, on ne comprend pas les choses. On s'y habitue simplement."
    zh: "在数学中，你并不真正理解事物；你只是逐渐习惯它们。"
  author:
    en: "John von Neumann"
    fr: "John von Neumann"
    zh: "约翰·冯·诺伊曼"
- text:
    en: "The purpose of computing is insight, not numbers."
    fr: "Le but du calcul est la compréhension, non les nombres."
    zh: "计算的目的在于洞见，而不在于数字。"
  author:
    en: "Richard Hamming"
    fr: "Richard Hamming"
    zh: "理查德·哈明"
- text:
    en: "The only way to learn mathematics is to do mathematics."
    fr: "La seule façon d'apprendre les mathématiques est de faire des mathématiques."
    zh: "学习数学的唯一方法，就是做数学。"
  author:
    en: "Paul Halmos"
    fr: "Paul Halmos"
    zh: "保罗·哈尔莫斯"
- text:
    en: "Mathematics is the art of giving the same name to different things."
    fr: "Les mathématiques sont l'art de donner le même nom à des choses différentes."
    zh: "数学是把相同名字赋予不同事物的艺术。"
  author:
    en: "Henri Poincaré"
    fr: "Henri Poincaré"
    zh: "亨利·庞加莱"
- text:
    en: "It is by logic that we prove, but by intuition that we discover."
    fr: "C'est par la logique que nous prouvons, mais par l'intuition que nous découvrons."
    zh: "我们用逻辑证明，却用直觉发现。"
  author:
    en: "Henri Poincaré"
    fr: "Henri Poincaré"
    zh: "亨利·庞加莱"
- text:
    en: "The book of nature is written in the language of mathematics."
    fr: "Le livre de la nature est écrit dans le langage des mathématiques."
    zh: "自然之书是用数学语言写成的。"
  author:
    en: "Galileo Galilei"
    fr: "Galileo Galilei"
    zh: "伽利略·伽利莱"
- text:
    en: "Nothing is so practical as a good theory."
    fr: "Rien n'est aussi pratique qu'une bonne théorie."
    zh: "没有什么比好的理论更实用。"
  author:
    en: "Kurt Lewin"
    fr: "Kurt Lewin"
    zh: "库尔特·勒温"
- text:
    en: "A problem worthy of attack proves its worth by fighting back."
    fr: "Un problème digne d'être attaqué prouve sa valeur en résistant."
    zh: "一个值得攻克的问题，会用反击来证明自己的价值。"
  author:
    en: "Piet Hein"
    fr: "Piet Hein"
    zh: "皮特·海因"
- text:
    en: "Chance favors the prepared mind."
    fr: "Le hasard favorise les esprits préparés."
    zh: "机会偏爱有准备的头脑。"
  author:
    en: "Louis Pasteur"
    fr: "Louis Pasteur"
    zh: "路易·巴斯德"
- text:
    en: "Nature uses only the longest threads to weave her patterns."
    fr: "La nature n'emploie que les fils les plus longs pour tisser ses motifs."
    zh: "自然只用最长的线来织就她的图案。"
  author:
    en: "Richard Feynman"
    fr: "Richard Feynman"
    zh: "理查德·费曼"
- text:
    en: "The first principle is that you must not fool yourself."
    fr: "Le premier principe est de ne pas se tromper soi-même."
    zh: "第一原则是：你不能欺骗自己。"
  author:
    en: "Richard Feynman"
    fr: "Richard Feynman"
    zh: "理查德·费曼"
- text:
    en: "What we cannot speak about we must pass over in silence."
    fr: "Ce dont on ne peut parler, il faut le taire."
    zh: "凡不可言说之事，必须保持沉默。"
  author:
    en: "Ludwig Wittgenstein"
    fr: "Ludwig Wittgenstein"
    zh: "路德维希·维特根斯坦"
- text:
    en: "Anyone who considers arithmetical methods of producing random digits is in a state of sin."
    fr: "Quiconque envisage des méthodes arithmétiques pour produire des chiffres aléatoires est en état de péché."
    zh: "凡考虑用算术方法产生随机数字的人，都是处于罪恶状态。"
  author:
    en: "John von Neumann"
    fr: "John von Neumann"
    zh: "约翰·冯·诺伊曼"
- text:
    en: "The sciences do not try to explain; they mainly make models."
    fr: "Les sciences ne cherchent pas à expliquer; elles construisent surtout des modèles."
    zh: "科学并不试图解释；它们主要是在建立模型。"
  author:
    en: "John von Neumann"
    fr: "John von Neumann"
    zh: "约翰·冯·诺伊曼"
- text:
    en: "In the fields of observation, chance favors only the prepared mind."
    fr: "Dans les champs de l'observation, le hasard ne favorise que les esprits préparés."
    zh: "在观察的领域里，机会只偏爱有准备的头脑。"
  author:
    en: "Louis Pasteur"
    fr: "Louis Pasteur"
    zh: "路易·巴斯德"
